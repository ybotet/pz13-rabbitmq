services:
  postgres:
    image: postgres:15
    container_name: pz7-postgres
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: tasksuser
      POSTGRES_PASSWORD: taskspass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pz7-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasksuser -d tasksdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  tasks:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: pz7-tasks
    # SIN PUERTOS EXPUESTOS AL HOST (solo red interna)
    environment:
      - AUTH_GRPC_ADDR=auth:50051
      - TASKS_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=tasksuser
      - DB_PASSWORD=taskspass
      - DB_NAME=tasksdb
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
    networks:
      - pz7-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pz7-redis
    command: redis-server --appendonly yes --appendfilename appendonly.aof
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pz7-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pz_rabbit
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  pz7-network:
    driver: bridge
